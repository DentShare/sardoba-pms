<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#2E7D32" />
  <title>Нет подключения — Sardoba PMS</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8faf8;
      color: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 1.5rem;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container {
      text-align: center;
      max-width: 400px;
      width: 100%;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: #2E7D32;
      color: #fff;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 2rem;
      box-shadow: 0 4px 14px rgba(46, 125, 50, 0.25);
    }

    .icon-offline {
      width: 48px;
      height: 48px;
      margin: 0 auto 1.5rem;
      color: #9ca3af;
    }

    h1 {
      font-size: 1.375rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 0.9375rem;
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: #2E7D32;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:hover {
      background: #256829;
    }

    .btn:active {
      background: #1b5e20;
    }

    .btn svg {
      width: 18px;
      height: 18px;
    }

    .status {
      margin-top: 2.5rem;
      font-size: 0.8125rem;
      color: #9ca3af;
    }

    .status .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      margin-right: 6px;
      vertical-align: middle;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">S</div>

    <svg class="icon-offline" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23" />
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9" />
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
      <line x1="12" y1="20" x2="12.01" y2="20" />
    </svg>

    <h1>Нет подключения к интернету</h1>
    <p>
      Проверьте соединение и попробуйте снова.
      Кешированные данные будут доступны, когда вы вернётесь онлайн.
    </p>

    <button class="btn" onclick="window.location.reload()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10" /><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
      </svg>
      Повторить
    </button>

    <div class="status">
      <span class="dot"></span> Офлайн
    </div>
  </div>

  <script>
    // Automatically reload when connectivity is restored
    window.addEventListener('online', function() {
      window.location.reload();
    });
  </script>
</body>
</html>
