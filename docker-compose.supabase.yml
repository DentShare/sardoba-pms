version: '3.8'

# ============================================================
# Sardoba PMS — Production with External Database (Supabase)
#
# PostgreSQL lives on Supabase → data persists independently.
# Only API + Web + Redis run locally/on VPS.
#
# Usage:
#   docker compose -f docker-compose.supabase.yml up -d --build
#
# Required env vars in .env:
#   DATABASE_URL=postgresql://postgres.xxxx:password@host:6543/postgres
# ============================================================

services:
  # Run database migrations before starting the API
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: sardoba-migrate
    command: ["node", "-e", "
      const { AppDataSource } = require('./apps/api/dist/database/data-source');
      AppDataSource.initialize()
        .then(ds => ds.runMigrations())
        .then(() => { console.log('Migrations complete'); process.exit(0); })
        .catch(err => { console.error('Migration failed:', err); process.exit(1); });
      "]
    environment:
      NODE_ENV: production
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: sardoba-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:3001/v1}
    container_name: sardoba-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'

  redis:
    image: redis:7-alpine
    container_name: sardoba-redis-prod
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-change_me_in_production}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-change_me_in_production}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'

volumes:
  redis_data:
